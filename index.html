<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Trợ lý học toán lớp 4 - Cô Nguyễn Thị Ngọc Điệp</title>
<style>
    body {
        font-family: 'Comic Sans MS', 'Arial', sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        margin: 0;
        padding: 0;
    }
    .chat-container {
        width: 90%;
        max-width: 900px;
        margin: 30px auto;
        background-color: #fff;
        border-radius: 20px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        padding: 20px;
        display: flex;
        flex-direction: column;
        min-height: 80vh;
        max-height: 90vh;
        overflow: hidden;
    }
    .header {
        text-align: center;
        padding: 15px;
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        border-radius: 15px;
        margin-bottom: 15px;
        color: white;
    }
    .header h1 {
        margin: 5px 0;
        font-size: 1.8rem;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    .header p {
        margin: 5px 0;
        font-size: 1.1rem;
    }
    .chat-box {
        flex: 1;
        overflow-y: auto;
        margin-bottom: 10px;
        padding: 15px;
        border: 3px solid #ffd700;
        border-radius: 15px;
        background: linear-gradient(to bottom, #fffef0 0%, #fff9e6 100%);
        position: relative;
    }
    .suggestions {
        margin: 10px 0;
        display: flex;
        justify-content: space-around;
        gap: 10px;
        flex-wrap: wrap;
    }
    .suggestion {
        font-size: 0.95rem;
        background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%);
        padding: 10px 15px;
        border-radius: 20px;
        cursor: pointer;
        user-select: none;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        transition: all 0.3s ease;
        border: 2px solid #f39c12;
        font-weight: bold;
        color: #2d3436;
    }
    .suggestion:hover {
        background: linear-gradient(135deg, #fdcb6e 0%, #f39c12 100%);
        transform: scale(1.05);
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    .user-message, .gemini-message, .image-message, .loading-message {
        margin: 10px 0;
        padding: 12px 15px;
        border-radius: 15px;
        max-width: 70%;
        word-wrap: break-word;
        font-size: 1.05rem;
    }
    .user-message {
        background: linear-gradient(135deg, #a8e6cf 0%, #56ccf2 100%);
        align-self: flex-end;
        margin-left: auto;
        border: 2px solid #3498db;
        color: #2c3e50;
        font-weight: 500;
    }
    .gemini-message {
        background: linear-gradient(135deg, #ffeaa7 0%, #fab1a0 100%);
        border: 2px solid #e17055;
        color: #2d3436;
        font-weight: 500;
    }
    .image-message img {
        max-width: 100px;
        height: auto;
        border-radius: 8px;
        margin-top: 5px;
        display: block;
    }
    .loading-message {
        background-color: #f0f0f0;
        text-align: center;
        margin-left: auto;
        margin-right: auto;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }
    .loading-message::before {
        content: '';
        width: 20px;
        height: 20px;
        border: 3px solid #ccc;
        border-top: 3px solid #007bff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    input[type="text"] {
        width: calc(100% - 110px);
        padding: 12px;
        border-radius: 15px;
        border: 3px solid #74b9ff;
        margin-right: 10px;
        box-sizing: border-box;
        font-size: 1.05rem;
        font-family: 'Comic Sans MS', Arial, sans-serif;
    }
    input[type="file"] {
        margin: 10px 0;
    }
    .preview-message {
        background-color: #fff3cd;
        border: 2px solid #ffeeba;
        padding: 10px;
        margin-top: 10px;
        border-radius: 15px;
        display: none;
    }
    button {
        padding: 12px 20px;
        border-radius: 15px;
        background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
        color: white;
        border: none;
        cursor: pointer;
        margin: 5px 3px;
        font-size: 1.05rem;
        font-weight: bold;
        transition: all 0.3s ease;
        box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }
    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 10px rgba(0,0,0,0.3);
    }
    .custom-file-upload {
        display: inline-block;
        padding: 12px 20px;
        border-radius: 15px;
        background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
        color: white;
        cursor: pointer;
        margin: 5px 3px;
        font-size: 1.05rem;
        font-weight: bold;
        transition: all 0.3s ease;
        box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }
    .custom-file-upload:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 10px rgba(0,0,0,0.3);
    }
    .input-row {
        display: flex;
        align-items: center;
    }
    .error-message {
        background-color: #f8d7da;
        border: 2px solid #f5c6cb;
        color: #721c24;
        padding: 15px;
        border-radius: 15px;
        margin-bottom: 15px;
        display: none;
        font-weight: bold;
    }
</style>

<!-- MathJax để hiển thị công thức toán học -->
<script>
    window.MathJax = {
        tex: {
            inlineMath: [['$', '$'], ['\\(', '\\)']]
        },
        svg: {
            fontCache: 'global'
        }
    };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <h1>🎓 Trợ lý học toán lớp 4 🎓</h1>
        <p>👩‍🏫 Cô Nguyễn Thị Ngọc Điệp</p>
    </div>
    <div class="error-message" id="error-message">Lỗi: Không thể kết nối đến Gemini API. Vui lòng kiểm tra API key.</div>
    <div class="chat-box" id="chat-box"></div>
    <div class="suggestions" id="suggestions-container"></div>
    <div class="input-row">
        <input type="text" id="user-input" placeholder="Hỏi cô về bài toán lớp 4 nhé! 📚✨" />
        <button onclick="sendMessage()" title="Nhấn để gửi tin nhắn">GỬI 📤</button>
        <button onclick="startRecognition()" title="Chat bằng giọng nói">🎙️ Nói</button>
        <label for="image-input" class="custom-file-upload" title="Tải ảnh lên">📷 Ảnh</label>
        <input type="file" id="image-input" accept="image/*" onchange="handleImageUpload()" style="display: none;" />
    </div>
    <div class="preview-message" id="preview-message"></div>
</div>

<script>
    // Cấu hình server proxy - Tự động phát hiện môi trường
    const isLocalFile = window.location.protocol === 'file:';
    const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
    
    let SERVER_URL;
    if (isLocalFile) {
        // Nếu mở file trực tiếp, thử localhost:3000 trước, nếu không được thì dùng Vercel
        SERVER_URL = 'http://localhost:3000';
        console.log('📁 Đang chạy từ file local, sẽ thử kết nối localhost:3000');
    } else if (isLocalhost) {
        SERVER_URL = 'http://localhost:3000';
        console.log('💻 Đang chạy trên localhost');
    } else {
        SERVER_URL = window.location.origin;
        console.log('☁️ Đang chạy trên Vercel:', SERVER_URL);
    }

    //Đoạn dưới này là những câu hỏi và trả lời mẫu để chatbot trả lời nhanh hơn mà không cần gọi API
    const localData = [
        { "prompt": "xin chào", "completion": "Xin chào! Mình là trợ lý của cô Ngọc Điệp. Bạn có thể hỏi mình những thắc mắc về bài học vừa rồi, mình sẽ giải đáp nhé! 😊📚" },
        { "prompt": "cô là ai", "completion": "Cô là Ngọc Điệp, giáo viên Tiểu học, chuyên dạy môn Toán lớp 4. Cô rất vui được đồng hành cùng các em! 📚✨" },
        { "prompt": "cô giáo là ai", "completion": "Cô giáo của các em là cô Nguyễn Thị Ngọc Điệp, cô dạy môn Toán lớp 4." },
        { "prompt": "số điện thoại của cô", "completion": "Các em có thể liên hệ với cô qua số điện thoại: 0363357745" },
        { "prompt": "giới thiệu", "completion": "Chào các em! Cô là trợ lý học toán lớp 4, được tạo ra để giúp các em học toán vui vẻ và hiệu quả hơn. Cô Nguyễn Thị Ngọc Điệp luôn sẵn sàng hỗ trợ các em!" }
    ];

    const allSuggestions = [
        "1 tấn bằng bao nhiêu tạ?",
        "1 tạ bằng bao nhiêu yến?",
        "1 yến bằng bao nhiêu kg?",
        "Đổi 5 tấn ra kg",
        "Đổi 250 kg ra tạ",
        "Cộng trừ các đơn vị khối lượng",
        "Bài toán về cân nặng",
        "So sánh tấn, tạ, yến",
        "Đổi đơn vị khối lượng",
        "Tính tổng khối lượng hàng hóa"
    ];

    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const errorMessage = document.getElementById('error-message');
    const previewMessage = document.getElementById('preview-message');
    const imageInput = document.getElementById('image-input');
    const suggestionsContainer = document.getElementById('suggestions-container');

    // Kiểm tra khi trang load
    window.addEventListener('load', async function() {
        const voiceButton = document.querySelector('button[title="Chat bằng giọng nói"]');
        if (!window.SpeechRecognition && !window.webkitSpeechRecognition) {
            voiceButton.style.display = 'none';
        }

        // Kiểm tra kết nối server
        if (isLocalFile || isLocalhost) {
            try {
                const response = await fetch(`${SERVER_URL}/api/health`, { 
                    method: 'GET',
                    mode: 'cors'
                });
                if (response.ok) {
                    console.log('✅ Server đang hoạt động');
                    appendMessage('gemini', '👋 Xin chào! Mình đã sẵn sàng giúp bạn học toán. Hãy thử hỏi mình nhé!');
                } else {
                    throw new Error('Server không phản hồi');
                }
            } catch (error) {
                console.warn('⚠️ Không thể kết nối server:', error);
                appendMessage('gemini', 
                    `⚠️ Chưa kết nối được server!\n\n` +
                    `📋 Để sử dụng đầy đủ tính năng, vui lòng:\n\n` +
                    `1. Mở Terminal/CMD trong thư mục project\n` +
                    `2. Chạy: npm install\n` +
                    `3. Chạy: npm start\n` +
                    `4. Truy cập: http://localhost:3000/index.html\n\n` +
                    `💡 Hiện tại bạn vẫn có thể dùng các câu hỏi gợi ý bên dưới!`
                );
            }
        }
    });

    function getRandomSuggestions(exclude = []) {
        const filtered = allSuggestions.filter(s => !exclude.includes(s));
        const shuffled = filtered.sort(() => 0.5 - Math.random());
        return shuffled.slice(0, 3);
    }

    function displaySuggestions(currentSuggestions) {
        suggestionsContainer.innerHTML = '';
        currentSuggestions.forEach(suggestion => {
            const suggestionDiv = document.createElement('div');
            suggestionDiv.classList.add('suggestion');
            suggestionDiv.title = suggestion;
            suggestionDiv.textContent = suggestion;
            suggestionDiv.onclick = () => {
                userInput.value = suggestion;
                sendMessage();
                const newSuggestions = getRandomSuggestions([suggestion]);
                displaySuggestions(newSuggestions);
            };
            suggestionsContainer.appendChild(suggestionDiv);
        });
    }

    displaySuggestions(getRandomSuggestions());

    function findBestMatch(input) {
        const normalizedInput = input.toLowerCase().trim();
        for (let item of localData) {
            const keywords = item.prompt.split(' ');
            if (keywords.every(k => normalizedInput.includes(k))) {
                return item.completion;
            }
        }
        return null;
    }

    function showLoading() {
        const loadingDiv = document.createElement('div');
        loadingDiv.classList.add('loading-message');
        loadingDiv.id = 'loading-message';
        loadingDiv.textContent = 'Đang xử lý...';
        chatBox.appendChild(loadingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        return loadingDiv;
    }

    function hideLoading() {
        const loadingDiv = document.getElementById('loading-message');
        if (loadingDiv) {
            loadingDiv.remove();
        }
    }

    async function sendMessage() {
        const message = userInput.value.trim();
        if (!message) return;

        appendMessage('user', message);
        userInput.value = '';
        previewMessage.style.display = 'none';

        const localResponse = findBestMatch(message);
        if (localResponse) {
            appendMessage('gemini', localResponse);
            return;
        }

        const loadingDiv = showLoading();

        try {
            console.log('Gửi yêu cầu đến server:', SERVER_URL);
            const response = await fetch(`${SERVER_URL}/api/chat`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    message: message
                }),
                mode: 'cors'
            });

            hideLoading();

            if (!response.ok) {
                const data = await response.json().catch(() => ({}));
                const errorMsg = data?.error || `Lỗi server: ${response.status}`;
                console.error('Lỗi server:', data);
                appendMessage('gemini', `Lỗi: ${errorMsg}`);
                return;
            }

            const data = await response.json();
            if (!data.reply) {
                appendMessage('gemini', 'Không nhận được phản hồi hợp lệ từ server.');
                return;
            }

            const reply = data.reply;
            appendMessage('gemini', reply);
        } catch (error) {
            hideLoading();
            console.error('Lỗi kết nối:', error);
            
            // Thông báo chi tiết hơn tùy theo môi trường
            let errorMsg = '';
            if (isLocalFile || isLocalhost) {
                errorMsg = `❌ Không thể kết nối đến server local!\n\n` +
                          `📋 Hướng dẫn khắc phục:\n\n` +
                          `1️⃣ Mở Terminal/Command Prompt\n` +
                          `2️⃣ Chạy lệnh: npm install\n` +
                          `3️⃣ Chạy lệnh: npm start\n` +
                          `4️⃣ Đợi server khởi động tại http://localhost:3000\n` +
                          `5️⃣ Refresh lại trang này\n\n` +
                          `💡 Hoặc truy cập trực tiếp: http://localhost:3000/index.html\n\n` +
                          `Chi tiết lỗi: ${error.message}`;
            } else {
                errorMsg = `Lỗi kết nối đến server. Vui lòng kiểm tra:\n` +
                          `- Server có đang chạy không?\n` +
                          `- URL server có đúng không?\n` +
                          `- Có vấn đề về CORS không?\n\n` +
                          `Chi tiết lỗi: ${error.message}`;
            }
            
            appendMessage('gemini', errorMsg);
        }
    }

    function formatAIMessage(text) {
        // Loại bỏ các dấu *** không cần thiết
        text = text.replace(/\*\*\*/g, '');

        // Chuyển đổi **text** thành <strong>text</strong>
        text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

        // Chuyển đổi *text* thành <em>text</em>
        text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');

        // Xử lý danh sách (- hoặc •)
        text = text.replace(/^\s*[-•]\s+(.+)$/gm, '<li>$1</li>');
        text = text.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');

        // Thay thế xuống dòng thành <br>
        text = text.replace(/\n\n/g, '</p><p>');
        text = text.replace(/\n/g, '<br>');

        // Bọc các đoạn văn bằng <p> nếu chúng chứa nội dung
        if (text.includes('</p><p>')) {
            text = '<p>' + text + '</p>';
        }

        return text;
    }

    function appendMessage(sender, message, imageUrl = null) {
        const messageDiv = document.createElement('div');
        messageDiv.classList.add(sender === 'user' ? 'user-message' : 'gemini-message');

        if (imageUrl) {
            messageDiv.classList.add('image-message');
            const img = document.createElement('img');
            img.src = imageUrl;
            messageDiv.appendChild(img);
        }

        if (message) {
            const textDiv = document.createElement('div');
            if (sender === 'gemini') {
                textDiv.innerHTML = formatAIMessage(message);
            } else {
                textDiv.innerHTML = message.replace(/\n/g, "<br>");
            }
            messageDiv.appendChild(textDiv);
        }

        chatBox.appendChild(messageDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        if (window.MathJax && window.MathJax.typesetPromise) {
            window.MathJax.typesetPromise().catch(err => {
                console.error('Lỗi MathJax:', err);
            });
        }
    }

    userInput.addEventListener('keydown', function(event) {
        if (event.key === 'Enter') sendMessage();
    });

    function startRecognition() {
        if (!window.SpeechRecognition && !window.webkitSpeechRecognition) {
            alert('Trình duyệt của bạn không hỗ trợ nhận dạng giọng nói.');
            return;
        }

        // Hiển thị loading "đang nghe"
        const listeningDiv = document.createElement('div');
        listeningDiv.classList.add('loading-message');
        listeningDiv.id = 'listening-message';
        listeningDiv.textContent = '🎤 Đang nghe...';
        listeningDiv.style.backgroundColor = '#e3f7e6';
        chatBox.appendChild(listeningDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'vi-VN';

        recognition.onstart = function() {
            const listeningMsg = document.getElementById('listening-message');
            if (listeningMsg) {
                listeningMsg.textContent = '🎤 Đang nghe...';
            }
        };

        recognition.onresult = function(event) {
            const voiceInput = event.results[0][0].transcript;
            userInput.value = voiceInput;
            previewMessage.innerText = `Bạn vừa nói: "${voiceInput}"`;
            previewMessage.style.display = 'block';

            // Xóa loading message
            const listeningMsg = document.getElementById('listening-message');
            if (listeningMsg) {
                listeningMsg.remove();
            }
        };

        recognition.onerror = function(event) {
            // Xóa loading message khi có lỗi
            const listeningMsg = document.getElementById('listening-message');
            if (listeningMsg) {
                listeningMsg.remove();
            }
            alert('Lỗi nhận dạng giọng nói: ' + event.error);
        };

        recognition.onend = function() {
            // Xóa loading message khi kết thúc
            const listeningMsg = document.getElementById('listening-message');
            if (listeningMsg) {
                listeningMsg.remove();
            }
        };

        recognition.start();
    }

    async function handleImageUpload() {
        const file = imageInput.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async function(event) {
            const base64Image = event.target.result;
            const base64Data = base64Image.split(',')[1];

            appendMessage('user', 'Bạn đã tải lên 1 hình ảnh, đợi tôi một chút...', base64Image);

            const loadingDiv = showLoading();

            try {
                console.log('Gửi yêu cầu phân tích hình ảnh đến server:', SERVER_URL);
                const response = await fetch(`${SERVER_URL}/api/image`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        image: base64Data,
                        mimeType: file.type
                    }),
                    mode: 'cors'
                });

                hideLoading();

                if (!response.ok) {
                    const data = await response.json().catch(() => ({}));
                    const errorMsg = data?.error || `Lỗi server: ${response.status}`;
                    console.error('Lỗi server:', data);
                    appendMessage('gemini', `Lỗi: ${errorMsg}`);
                    return;
                }

                const data = await response.json();
                if (!data.reply) {
                    appendMessage('gemini', 'Không nhận được phản hồi hợp lệ từ server.');
                    return;
                }

                const description = data.reply;
                appendMessage('gemini', description);
            } catch (error) {
                hideLoading();
                console.error('Lỗi kết nối:', error);
                appendMessage('gemini', `Lỗi kết nối đến server khi phân tích hình ảnh. Vui lòng kiểm tra:\n- Server có đang chạy không?\n- URL server có đúng không?\n- Có vấn đề về CORS không?\n\nChi tiết lỗi: ${error.message}`);
            }
        };

        reader.readAsDataURL(file);
    }
</script>
</body>
</html>
